<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ViaConnect GeneX360 — FarmCeutica Wellness</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#111827;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
    .logo{font-size:2.5rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:0.25rem}
    .genex{color:#B75F19;font-size:1.25rem;font-weight:600;margin-bottom:0.5rem}
    .tagline{color:#76866F;font-size:0.95rem;margin-bottom:2.5rem;text-align:center}
    .portals{display:flex;flex-direction:column;gap:1rem;width:100%;max-width:360px}
    .btn{display:block;padding:1rem 1.5rem;border-radius:1rem;text-align:center;font-size:1.1rem;font-weight:600;text-decoration:none;transition:opacity 0.15s}
    .btn:hover{opacity:0.85}
    .btn-teal{background:#224852;color:#fff}
    .btn-green{background:#4ADE80;color:#111827}
    .btn-plum{background:#6D597A;color:#fff}
    .footer{color:#374151;font-size:0.75rem;margin-top:3rem}
    .badge{display:inline-block;background:#224852;color:#E8F0F2;padding:0.25rem 0.75rem;border-radius:2rem;font-size:0.7rem;margin-top:1.5rem;letter-spacing:0.05em}
  </style>
</head>
<body>
  <div class="logo">ViaConnect</div>
  <div class="genex">GeneX360</div>
  <div class="tagline">One Genome. One Formulation. One Life at a Time.</div>
  <div class="portals">
    <a class="btn btn-teal" href="/app">Personal Wellness</a>
    <a class="btn btn-green" href="/app">Practitioner Portal</a>
    <a class="btn btn-plum" href="/app">Naturopath Portal</a>
  </div>
  <div class="badge">DOWNLOAD ON iOS &amp; ANDROID — COMING SOON</div>
  <div class="footer">FarmCeutica Wellness LLC — Buffalo, NY</div>
</body>
</html>
